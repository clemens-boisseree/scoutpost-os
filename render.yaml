services:
  - type: web
    name: cojournalist
    runtime: docker
    plan: starter
    region: frankfurt
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: AWS_API_BASE_URL
        value: https://kubbp7dr0b.execute-api.eu-central-1.amazonaws.com/dev
      - key: VITE_API_URL
        sync: false
      - key: DEBUG
        value: false
      - key: PUBLIC_MAPTILER_API_KEY
        sync: false
      # Supabase — auth broker (backend runtime)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: APP_POST_LOGIN_REDIRECT
        value: https://www.scoutpost.ai/auth/callback
      # Webhook paused until PR 2a ships post-cutover
      - key: MUCKROCK_WEBHOOK_PAUSED
        value: "true"
      # Supabase — frontend build-time (baked into SPA bundle via Vite)
      - key: PUBLIC_SUPABASE_URL
        sync: false
      - key: PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: PUBLIC_DEPLOYMENT_TARGET
        value: supabase
      # SaaS: MuckRock button on /login. OSS leaves this blank and the email/password form renders.
      - key: PUBLIC_MUCKROCK_ENABLED
        value: "true"
