name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run build
        env:
          PUBLIC_MAPTILER_API_KEY: "placeholder"

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npx svelte-kit sync
      - run: cd frontend && npm test

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - run: pip install -r backend/requirements-dev.txt
      - run: cd backend && python -m pytest tests/unit/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run check

  selfhost-maintenance:
    name: Self-host maintenance tooling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Shell syntax
        run: bash -n selfhost/selfhost-doctor.sh selfhost/adopt-signup-allowlist.sh selfhost/setup-from-manifest.sh selfhost/docker-install-entrypoint.sh

      - name: Deno formatting
        run: deno fmt --check selfhost/selfhost_maintenance_test.ts supabase/functions/_shared/selfhost_runtime_smoke_test.ts

      - name: Maintenance script behavior
        run: deno test --allow-read --allow-write --allow-run --allow-env selfhost/selfhost_maintenance_test.ts

      - name: Runtime smoke compiles without local env
        run: deno test --allow-env --allow-net supabase/functions/_shared/selfhost_runtime_smoke_test.ts

      - name: Workflow YAML parses
        run: ruby -e 'require "yaml"; YAML.load_file("selfhost/sync-upstream.yml"); puts "sync-upstream yaml ok"'

  oss-mirror-check:
    name: OSS mirror validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Strip SaaS-only code
        run: bash scripts/ops/strip-oss.sh

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Verify public setup assets survive strip
        run: |
          test -f selfhost/SETUP_AGENT.md
          test -f selfhost/selfhost-doctor.sh
          test -f selfhost/adopt-signup-allowlist.sh
          test -f selfhost/selfhost_maintenance_test.ts
          test -f selfhost/sync-upstream.yml
          test -f deploy/installer/scoutpost-setup.example.json
          test -f deploy/SETUP.md
          test -f deploy/render/render.yaml

      - name: Build stripped frontend
        run: cd frontend && npm run build
        env:
          PUBLIC_MAPTILER_API_KEY: "placeholder"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Validate backend boots after strip
        run: |
          pip install -r backend/requirements.txt
          cd backend
          DEPLOYMENT_TARGET=supabase python -c "from app.main import app; print('OSS boot test passed')"

  selfhost-runtime-smoke:
    name: Self-host local runtime smoke
    runs-on: ubuntu-latest
    # 25 was enough for a single supabase start. With up to 3 retries to absorb
    # transient public.ecr.aws image-pull flakes the worst case is ~3 cold
    # pulls. 40 leaves headroom for that plus the actual smoke test.
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Install Supabase CLI
        env:
          SUPABASE_CLI_VERSION: 2.99.0
        run: |
          # GitHub releases occasionally 502 on download; retry curl.
          for attempt in 1 2 3; do
            if curl -fsSL --retry 3 --retry-delay 5 --retry-all-errors \
              -o /tmp/supabase.tar.gz \
              "https://github.com/supabase/cli/releases/download/v${SUPABASE_CLI_VERSION}/supabase_${SUPABASE_CLI_VERSION}_linux_amd64.tar.gz"; then
              break
            fi
            echo "supabase CLI download failed (attempt $attempt); retrying"
            sleep $((attempt * 5))
          done
          sudo tar -xzf /tmp/supabase.tar.gz -C /usr/local/bin
          supabase --version

      - name: Start local Supabase
        # `supabase start` pulls a dozen images from public.ecr.aws on a cold
        # GitHub runner. Transient ECR pull timeouts/resets are the dominant
        # flake mode for this job. Retry the start up to 3 times, tearing
        # down between attempts so we get a clean docker network each try.
        run: |
          set -e
          attempt=0
          max_attempts=3
          until supabase start; do
            attempt=$((attempt + 1))
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "supabase start failed after $attempt attempts" >&2
              docker ps -a || true
              docker images || true
              exit 1
            fi
            echo "supabase start failed (attempt $attempt/$max_attempts); tearing down and retrying after backoff"
            supabase stop --no-backup || true
            sleep $((10 * attempt))
          done
          supabase db reset --local --yes
          supabase status -o env | tee /tmp/scout-supabase.env

      - name: Wait for Edge Functions
        run: |
          # shellcheck disable=SC1091
          source /tmp/scout-supabase.env
          for _ in {1..60}; do
            status="$(curl -sS -o /tmp/scout-functions-health.txt -w '%{http_code}' "${API_URL}/functions/v1/scouts" || true)"
            if [ "$status" = "401" ]; then
              exit 0
            fi
            sleep 2
          done

          docker logs supabase_edge_runtime_cojournalist || true
          cat /tmp/scout-functions-health.txt || true
          exit 1

      - name: Run local self-host smoke
        run: |
          set -a
          # shellcheck disable=SC1091
          source /tmp/scout-supabase.env
          set +a
          SCOUT_SELFHOST_RUNTIME_SMOKE=1 deno test --allow-env --allow-net supabase/functions/_shared/selfhost_runtime_smoke_test.ts

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup || true

  cli-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Run CLI unit tests (offline)
        run: cd cli && deno test --allow-read --allow-write --allow-env --allow-net commands/_test.ts

  cli-smoke:
    name: scout live smoke
    runs-on: ubuntu-latest
    # Only runs when the test secrets are populated. Tom adds these at his
    # discretion in repo settings → Secrets and variables → Actions.
    if: ${{ vars.SCOUT_SMOKE_ENABLED == 'true' || vars.COJO_SMOKE_ENABLED == 'true' }}
    needs: cli-test
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Run scout live smoke tests
        env:
          SCOUT_TEST_API_URL: ${{ secrets.SCOUT_TEST_API_URL || secrets.COJO_TEST_API_URL }}
          SCOUT_TEST_API_KEY: ${{ secrets.SCOUT_TEST_API_KEY || secrets.COJO_TEST_API_KEY }}
          SCOUT_TEST_SUPABASE_ANON_KEY: ${{ secrets.SCOUT_TEST_SUPABASE_ANON_KEY || secrets.COJO_TEST_SUPABASE_ANON_KEY }}
        run: cd cli && deno test --allow-read --allow-write --allow-env --allow-net commands/_smoke.test.ts

  audit-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install pip-audit
      # PYSEC-2025-183/CVE-2025-45768 is a disputed, no-fixed-version PyJWT
      # advisory about weak HMAC keys. Residual FastAPI HS256 JWT paths use
      # PyJWT's minimum-key-length enforcement so weak keys fail closed.
      - run: pip-audit -r backend/requirements.txt --ignore-vuln PYSEC-2025-183

  audit-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm audit --audit-level=high

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
